  # === POSTFACH CRUD (reverse-engineered from JS source) ===
  /kokos/kokos-ui-service/pd/v1/ordner/{ordnerType}/nachrichten/{nachrichtId}:
    get:
      operationId: getNachricht
      summary: Read single message (full body)
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: ordnerType
          in: path
          required: true
          schema:
            type: string
            enum: [entwurf, erhalten, geloescht, gesendet]
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full message with body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NachrichtDetail"
        "403":
          description: Trust level insufficient (vNiveau too low)
    delete:
      operationId: deleteNachricht
      summary: Move message to trash
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: ordnerType
          in: path
          required: true
          schema:
            type: string
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Message moved to trash

  /kokos/kokos-ui-service/pd/v1/ordner/senden/nachrichten:
    post:
      operationId: sendNachricht
      summary: Send a message
      description: |
        Sends a message to the selected office. The message is delivered
        to the Leistungspostfach of the office (not directly to a caseworker).
        Body must include bezug from the anliegen catalog.
      tags: [Postfach]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNachrichtRequest"
      responses:
        "200":
          description: Message sent successfully

  /kokos/kokos-ui-service/pd/v1/ordner/entwurf/nachrichten:
    post:
      operationId: saveEntwurf
      summary: Save message as draft
      description: Creates a draft message. Returns Location header with draft URL.
      tags: [Postfach]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNachrichtRequest"
      responses:
        "201":
          description: Draft created
          headers:
            Location:
              description: URL of the created draft
              schema:
                type: string
                format: uri

  /kokos/kokos-ui-service/pd/v1/ordner/geloescht/nachrichten/{nachrichtId}:
    put:
      operationId: restoreNachricht
      summary: Restore message from trash
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Message restored
    delete:
      operationId: deleteNachrichtPermanent
      summary: Permanently delete message from trash
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Message permanently deleted

  # === POSTFACH ATTACHMENTS (Upload-Pfad: /ud/v1) ===
  /kokos/kokos-ui-service/ud/v1/ordner/entwurf/nachrichten/{nachrichtId}/anhaenge:
    post:
      operationId: uploadAnhang
      summary: Upload attachment to draft message
      description: |
        Upload a file attachment to an existing draft.
        Uses the upload path prefix (/ud/v1 instead of /pd/v1).

        ## Restrictions (verified from JS source)
        - **Accepted formats:** PDF, PNG, JPEG, BMP only
        - **Magic bytes validated:** Client checks first 4 bytes (not just extension)
        - **Max file size:** 7.5 MB per file AND 7.5 MB total per message
        - **Max pages:** 100 (for PDFs)
        - **Filename max:** 80 characters
        - **Filename rules:** No leading/trailing dots or spaces, no OS-reserved words
        - **All uploads converted to PDF server-side**
        - **Virus scan:** Documents rejected if infected (FFP virus-infected)

        ## Error codes (FFP)
        - 430: Filename too long
        - 440: Invalid characters in filename
        - 441-444: Filename starts/ends with dot/space
        - 445: Reserved OS word
        - 450: File too large (7.5 MB)
        - 451: Converted PDF too large
        - 455: Total message size exceeded
        - 470: Invalid file format
        - 471-474: Non-convertible PDF/image variants
        - 475: Too many pages (>100)
        - 490: Duplicate file
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    File to upload. Accepted MIME types:
                    - application/pdf
                    - image/png
                    - image/jpeg
                    - image/bmp
            encoding:
              file:
                contentType: application/pdf, image/png, image/jpeg, image/bmp
      responses:
        "201":
          description: Attachment uploaded
        "400":
          description: Validation error (see FFP codes in description)

  /kokos/kokos-ui-service/ud/v1/ordner/entwurf/nachrichten/{nachrichtId}/anhaenge/{anhangId}/upload-status:
    get:
      operationId: getUploadStatus
      summary: Check upload progress
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: anhangId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload status

  /kokos/kokos-ui-service/pd/v1/ordner/{ordnerType}/nachrichten/{nachrichtId}/anhaenge/{anhangId}:
    get:
      operationId: downloadAnhang
      summary: Download attachment
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: ordnerType
          in: path
          required: true
          schema:
            type: string
        - name: nachrichtId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: anhangId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # === NOTIFICATION CONFIG ===
  /miso/miso-notification-service/pd/v2/notification/mail/konfiguration:
    get:
      operationId: getMailKonfiguration
      summary: Get email notification preferences
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Email notification config with delivery preferences
          content:
