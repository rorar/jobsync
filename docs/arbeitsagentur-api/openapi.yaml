  /jobboerse/jobsuche-service/pd/v1/suchauftraege/teaser:
    get:
      operationId: getSuchauftraegeTeaser
      summary: Get saved job search teasers
      tags: [Jobboerse]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Search agents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /jobboerse/jobsuche-service/pd/v1/vormerkungen/teaser:
    get:
      operationId: getVormerkungenTeaser
