openapi: 3.1.0
info:
  title: arbeitsagentur.de REST API (Reverse-Engineered)
  description: |
    Reverse-engineered API specification for arbeitsagentur.de services.
    Captured via CDP Network Analysis on 2026-05-17.

    ## Authentication
    All `/pd/` endpoints require OAuth2 Bearer Token.
    All `/pc/` endpoints are public (no auth needed).

    ## OAuth2 Clients
    | Client | App | Secret |
    |--------|-----|--------|
    | profil-online | Profil-Dashboard | profil-online |
    | ota-online | Terminverwaltung | unknown |
    | kokos | Leistungspostfach | kokos |

    ## Session Limits
    - Access Token: 240s (auto-refresh)
    - Session Hard-Limit: 30 minutes (server-enforced)
    - Rate-Limit: 1000 req (on vamio-jsonapi)

    ## DISCLAIMER
    This spec was created through observation only. It is NOT officially documented.
    Use at your own risk. See ROADMAP.md §1.9 for legal considerations.
  version: 0.1.0-draft
  contact:
    name: "@rorar"
    url: https://github.com/rorar
  license:
    name: Private - Not for distribution
    identifier: UNLICENSED

servers:
  - url: https://rest.arbeitsagentur.de
    description: |
      Production REST API Gateway.
      Path conventions:
        - /pd/v{n}/ = personal data (auth required)
        - /pc/v{n}/ = public content (no auth)
        - /ud/v{n}/ = upload data (auth required, file uploads)
      URL calculation for kokos:
        Frontend /kokos/kokos-ui/pd/ → Backend /kokos/kokos-ui-service/{pd|ud}/v1/
  - url: https://sso.arbeitsagentur.de
    description: |
      Keycloak SSO (Realm: OCP). Handles OAuth2/OIDC token lifecycle.
      Not a REST API in the traditional sense — used for token exchange only.

tags:
  - name: Profil
    description: Dashboard personalization
  - name: Termine
    description: Appointment management (OTA Service)
  - name: Postfach
    description: Benefits mailbox (KOKOS Service)
  - name: Vermittlung
    description: Placement services (JSON:API format)
  - name: Jobboerse
    description: Job board services (Vermittlungsvorschläge)
  - name: Notifications
    description: Notification bell + email config (MISO Service)
  - name: Dienststellen
    description: Office/agency information
  - name: Leistungen
    description: Benefits and cases
  - name: System
    description: Maintenance and config (public)
  - name: Auth
    description: OAuth2/OIDC token lifecycle (Keycloak SSO)

paths:
  # === AUTH (sso.arbeitsagentur.de) ===
  /auth/realms/OCP/protocol/openid-connect/token:
    post:
      operationId: exchangeToken
      summary: Exchange authorization code or refresh token
      description: |
        OAuth2 Token Endpoint (Keycloak Realm OCP).
        Supports two grant types:
        - `authorization_code` — initial login (with PKCE code_verifier)
        - `refresh_token` — silent token refresh (every ~4 min)

        Server: `sso.arbeitsagentur.de` (NOT rest.arbeitsagentur.de)
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: "#/components/schemas/TokenRequestAuthCode"
                - $ref: "#/components/schemas/TokenRequestRefresh"
            examples:
              authorizationCode:
                summary: Initial login (code exchange)
                value:
                  grant_type: authorization_code
                  redirect_uri: https://web.arbeitsagentur.de/profil/profil-ui/pd/
                  code: "<AUTH_CODE>"
                  code_verifier: "<PKCE_VERIFIER>"
                  correlation-id: "<UUID>"
                  client_id: profil-online
                  client_secret: profil-online
              refreshToken:
                summary: Silent token refresh
                value:
                  grant_type: refresh_token
                  refresh_token: "<CURRENT_REFRESH_TOKEN>"
                  scope: openid baportal
                  correlation-id: "<UUID>"
                  client_id: profil-online
                  client_secret: profil-online
      responses:
        "200":
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid grant (session expired or bad code)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
              examples:
                sessionExpired:
                  summary: Session ended (30-min hard limit reached)
                  value:
                    error: invalid_grant
                    error_description: "Session not active"

  /auth/realms/OCP/protocol/openid-connect/logout:
    get:
      operationId: logout
      summary: End SSO session (client-initiated)
      description: |
        Triggered by the oiam-oauth-wc when the 30-min session timer expires.
        Invalidates all tokens (including refresh tokens for other clients sharing the session).
        After this call, ALL apps (profil-ui, kokos-ui, termine) lose their session.
      tags: [Auth]
      security: []
      parameters:
        - name: id_token_hint
          in: query
          required: true
          description: The current id_token (proves identity for logout)
          schema:
            type: string
      responses:
        "302":
          description: Redirect to www.arbeitsagentur.de (logged out)
  # === PROFIL ===
  /profil/profil-service/pd/v1/personalization:
    get:
      operationId: getPersonalization
