              schema:
                $ref: "#/components/schemas/MailKonfiguration"

  # === VERMITTLUNG ===
  /vermittlung/vamio-jsonapi/pd/v1/person/{kundennr}:
    get:
      operationId: getPerson
      summary: Get person data with includes
      description: JSON:API 1.0 format with sparse fieldsets and includes
      tags: [Vermittlung]
      security:
        - bearerAuth: []
      parameters:
        - name: kundennr
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Z0-9]{10}$"
        - name: include
          in: query
          schema:
            type: string
          example: zugeordneteDienststelle,vermittlungsmerkmale
        - name: "fields[dienststelle]"
          in: query
          schema:
            type: string
          example: nummer
        - name: "fields[vermittlungsmerkmale]"
          in: query
          schema:
            type: string
          example: istAVAngemeldet,istBBAngemeldet,istBBiEAngemeldet
      responses:
        "200":
          description: Person data (JSON:API)
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/JsonApiPersonResponse"
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: "Rate limit (observed: 1000)"

  /vermittlung/nks-service/pd/v1/kundeninformation:
    get:
      operationId: getNksKundeninformation
      summary: Get "Nächste Schritte" status
      tags: [Vermittlung]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Next steps status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NksKundeninformation"

  /vermittlung/oalo-service/pd/v1/kundeninformation:
    get:
      operationId: getOaloKundeninformation
      summary: Get job-seeking/unemployed registration status
      tags: [Vermittlung]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OaloKundeninformation"

  # === JOBBOERSE ===
  /jobboerse/vv-service/pd/v2/vv:
    get:
      operationId: getVermittlungsvorschlaege
      summary: Get placement suggestions from advisor
      tags: [Jobboerse]
      security:
        - bearerAuth: []
      parameters:
        - name: updateAufrufdatum
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Placement suggestions summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VermittlungsvorschlaegeResponse"

  /jobboerse/vv-service/pd/v2/se:
    get:
      operationId: getStellenempfehlungen
