  /besch-schriftstueck-service/api/pd/v2/schriftstueckanzahlungelesen:
    get:
      operationId: getUngeleseneSchriftstuecke
      summary: Get unread decisions/notices count
      tags: [Leistungen]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  anzahlUngeleseneSchriftstuecke:
                    type: integer

  # === SYSTEM (PUBLIC) ===
  /cmsportal/cmsportal-api/pc/wartungshinweis:
    get:
      operationId: getWartungshinweis
      summary: Get maintenance notice (public, no auth)
      tags: [System]
      responses:
        "200":
          description: Maintenance info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wartungshinweis"

  # === KOMMUNIKATIONS-EINSTELLUNGEN ===
  /kusos/kusos-public-service/pd/v5/person/einstelloptionen:
    get:
      operationId: getEinstelloptionen
      summary: Get communication settings
      tags: [Profil]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Communication preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Einstelloptionen"

components:
  schemas:
    # --- Profil ---
    Personalization:
      type: object
      properties:
        sektionen:
          type: array
          items:
            type: string

    Einstelloptionen:
      type: object
      properties:
        datenuebernahme:
          type: boolean
        onlinekommunikation:
          type: boolean
        videokommunikation:
          type: boolean
        sms:
          type: boolean

    # --- Termine ---
    AppointmentsResponse:
      type: object
      properties:
        pastAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        upcomingAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"

    Appointment:
      type: object
      required: [subject, date, startTime, endTime, contactType]
      properties:
        subject:
          type: string
          description: Appointment type
          examples: ["Vermittlungsgespräch", "Beratungstermin"]
        weekday:
          type: string
          examples: ["Montag", "Dienstag"]
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        endTime:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        agentur:
          $ref: "#/components/schemas/Agency"
        responsible:
          type: string
          nullable: true
          description: Advisor name
        location:
          type: object
          nullable: true
          properties:
            description:
              type: string
              description: Room number
            dienstelleNummer:
              type: string
        shortly:
          type: boolean
          description: Appointment is imminent
        legalStatement:
          type: boolean
          description: Legally binding (Meldetermin)
        contactType:
          type: string
          enum: [VIDEO, PERSOENLICH, TELEFON]
        videoUrl:
          type: string
          format: uri
          nullable: true
        wasCanceled:
          type: boolean
        online:
          type: boolean
        shiftUrl:
          type: string
          nullable: true
        cancelUrl:
          type: string
          nullable: true

    AppointmentSummary:
      type: object
      properties:
        subject:
          type: string
        contactType:
          type: string
          enum: [VIDEO, PERSOENLICH, TELEFON]
        date:
          type: string
          format: date
        responsible:
          type: string
          nullable: true
        startTime:
          type: string

    Agency:
      type: object
      properties:
        name:
          type: string
        street:
          type: string
        housenumber:
          type: string
        plz:
          type: string
          pattern: "^\\d{5}$"
        city:
          type: string
        agencyNumber:
          type: string

    AccessAgencies:
      type: object
      properties:
        sgb2:
          type: object
          nullable: true
          properties:
            generalEntryUrl:
              type: string
              format: uri
            agency:
              $ref: "#/components/schemas/Agency"
        sgb3:
          type: object
          nullable: true
          properties:
            generalEntryUrl:
              type: string
              format: uri
            agency:
              $ref: "#/components/schemas/Agency"

    # --- Postfach ---
    PostfachContext:
      type: object
      properties:
        identity:
          type: string
          description: "URN format: urn:bafor:step:person:kundennummer:{id}"
        actingOnBehalf:
          type: string
        actingOnBehalfOnlineKommunikation:
          type: boolean
        actingOnBehalfKontoStatus:
          type: string
          enum: [AKTIV, GESPERRT, INAKTIV]
        loginVNiveau:
          type: string
          enum: [STORK-QAA-Level-1, STORK-QAA-Level-2, STORK-QAA-Level-3, STORK-QAA-Level-4]
        kundenTyp:
          type: string
          enum: [Person, Unternehmen]

    Ordner:
      type: object
      properties:
        id:
          type: string
          enum: [entwurf, erhalten, geloescht, gesendet]
        name:
          type: string
        anzahlGesamt:
          type: integer
        anzahlUngelesen:
          type: integer

    NachrichtSummary:
      type: object
      required: [nachrichtId, datum, gelesen, ordnerType, bezug, betreff, typ]
      properties:
        nachrichtId:
          type: string
          format: uuid
        datum:
          type: string
          format: date-time
        gelesen:
          type: boolean
        antwortErlaubt:
          type: boolean
        ordnerType:
          type: string
          enum: [erhalten, gesendet, entwurf, geloescht]
        anhang:
          type: boolean
        bezug:
          type: string
          description: Message category tag
        betreff:
          type: string
        dienststellennummer:
          type: string
        dienststellenname:
          type: string
        typ:
          type: string
          enum: [JC, AA]
          description: "JC = Jobcenter, AA = Agentur für Arbeit"
        vNiveauAusreichend:
          type: boolean
        vNiveau:
          type: string
        leserId:
          type: string
          nullable: true
        leserName:
          type: string
          nullable: true
        vertretungsBeziehung:
          type: string
          enum: [NICHT_RELEVANT, VERTRETUNG, BEVOLLMAECHTIGT]
        autorId:
          type: string
          nullable: true
        autorName:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        empfaengerId:
          type: string
        empfaengerName:
          type: string

    DienststellenVorbelegung:
      type: object
      properties:
        dstVorbelegungSGB2:
          $ref: "#/components/schemas/DienststelleVorbelegung"
        dstVorbelegungSGB3:
          $ref: "#/components/schemas/DienststelleVorbelegung"
        dstVorbelegungFamka:
          $ref: "#/components/schemas/DienststelleVorbelegung"
        dstVorbelegungZav:
          $ref: "#/components/schemas/DienststelleVorbelegung"
        wohnanschriftBekannt:
          type: boolean
        vorbelegt:
          type: string
          enum: [JC, AA, Famka, ZAV]

    DienststelleVorbelegung:
      type: object
      nullable: true
      properties:
        dienststellenNummer:
          type: string
        dienststellenName:
          type: string
        dienststellenArt:
          type: string
          enum: [GE, AA, Famka, ZAV]
        strasse:
          type: string
        hausnummer:
          type: string
        plz:
          type: string
        ort:
          type: string
        teilnehmend:
          type: boolean

    Anliegen:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        subanliegen:
          type: array
          items:
            $ref: "#/components/schemas/Subanliegen"

    Subanliegen:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        bezug:
          type: string
          description: Becomes the message's category tag
        hinweis:
          type: string
          nullable: true
          description: Help text (may contain HTML)
        link:
          type: string
          nullable: true
        linkText:
          type: string
          nullable: true
        nachrichtErstellen:
          type: boolean
          description: Whether message creation is allowed
        anhangErlaubt:
          type: boolean
          description: Whether file attachment is allowed

    # --- Vermittlung ---
    JsonApiPersonResponse:
      type: object
      properties:
        jsonapi:
          type: object
          properties:
            version:
              type: string
              const: "1.0"
        data:
          type: object
          properties:
            type:
              type: string
              const: Person
            id:
              type: string
            meta:
              type: object
              properties:
                anlagedatum:
                  type: string
                  format: date-time
                aenderungsdatum:
                  type: string
                  format: date-time
        included:
          type: array
          items:
            type: object

    NksKundeninformation:
      type: object
      properties:
        persoenlicheDaten:
          type: object
          properties:
            enabled:
              type: boolean
        lebenslauf:
          type: object
          properties:
            enabled:
              type: boolean
            data:
              type: object
              properties:
                uebermittlungsDatum:
                  type: string
                  format: date-time
        eignung:
          type: object
          properties:
            enabled:
              type: boolean
        faehigkeiten:
          type: object
          properties:
            enabled:
              type: boolean
        istAVgemeldet:
          type: boolean
        istBBgemeldet:
          type: boolean

    OaloKundeninformation:
      type: object
      properties:
        oasu:
          type: object
          properties:
            enabled:
              type: boolean
        lebenslauf:
          type: object
          properties:
            enabled:
              type: boolean
        faehigkeiten:
          type: object
          properties:
            enabled:
              type: boolean
        beratungsgespraech:
          type: object
          properties:
            enabled:
              type: boolean
        oalo:
          type: object
          properties:
            enabled:
              type: boolean
        istAVgemeldet:
          type: boolean
        istBBgemeldet:
          type: boolean
        tdaBestaetigt:
          type: boolean

    # --- Jobboerse ---
    VermittlungsvorschlaegeResponse:
      type: object
      properties:
        anzahlGesamt:
          type: integer
        anzahlNeue:
          type: integer
        einsprungslink:
          type: string
          format: uri
        letzterAufruf:
          type: string
          format: date-time

    StellenempfehlungenResponse:
      type: object
      properties:
        anzahlGesamt:
          type: integer
        anzahlNeue:
          type: integer
        einsprungslink:
          type: string
          format: uri

    VermittlungsPostfachSummary:
      type: object
      properties:
        anzahlGesamt:
          type: integer
        anzahlUngelesen:
          type: integer
        name:
          type: string
        id:
          type: string

    # --- Notifications ---
    MitteilungenAnzahl:
      type: object
      properties:
        gesamt:
          type: integer
        keineKenntnisnahme:
          type: integer

    MailKonfiguration:
      type: object
      properties:
        emailAdresse:
          type: string
          format: email
        emailAktiviert:
          type: boolean
        mitteilungsArten:
          type: array
          items:
            type: object
            properties:
              mitteilungsArt:
                type: string
                enum:
                  - NEUE_PFNACHRICHT_ERHALTEN_LEISTUNG
                  - NEUE_PFNACHRICHT_ERHALTEN_VERMITTLUNG
                  - NEUER_VERMITTLUNGSVORSCHLAG
                  - NEUE_STELLENEMPFEHLUNG
                  - VAM_AG_VERMITTLUNGSVORSCHLAG_ERSTELLT
                  - VAM_BEWERBUNG_EINGEGANGEN
              zustellungsArt:
                type: string
                enum: [SOFORT, TAEGLICH, KEINE]

    # --- Dienststellen ---
    OrgeinheittypResponse:
      type: object
      properties:
        content:
          type: object
          properties:
            id:
              type: integer
            dstnr5:
              type: string
            orgEinheitTyp:
              type: string
              enum: [JOBCENTER, AGENTUR]
        _links:
          type: object
          additionalProperties:
            type: object
            properties:
              href:
                type: string
                format: uri

    DienststelleKontakt:
      type: object
      properties:
        name:
          type: string
        strasse:
          type: string
        ort:
          type: string
        postort:
          type: string
        plz:
          type: string
        hausnummer:
          type: string
        lpurl:
          type: string

    # --- Postfach CRUD Schemas ---
    NachrichtDetail:
      type: object
      description: Full message with body text (schema predicted, not yet captured via network)
      properties:
        nachrichtId:
          type: string
          format: uuid
        datum:
          type: string
          format: date-time
        gelesen:
          type: boolean
        antwortErlaubt:
          type: boolean
        ordnerType:
          type: string
        anhang:
          type: boolean
        anhaengeMetadaten:
          type: array
          items:
            $ref: "#/components/schemas/AnhangMetadaten"
        bezug:
          type: string
        betreff:
          type: string
        text:
          type: string
          description: Full message body text
        dienststellennummer:
          type: string
        dienststellenname:
          type: string
        typ:
          type: string
          enum: [JC, AA]
        autorName:
          type: string
        senderName:
          type: string
        empfaengerName:
          type: string

    AnhangMetadaten:
      type: object
      properties:
        id:
          type: string
        dateiname:
          type: string
          maxLength: 80
          description: |
            Filename restrictions (verified from JS source):
            - Max 80 characters
            - Must not start/end with dot or space
            - Must not be OS-reserved word (CON, NUL, PRN, etc.)
            - Only ERLAUBTEZEICHEN charset allowed
            - No duplicate filenames per message
        groesse:
          type: integer
          description: File size in bytes (max 7.5 MB = 7864320 bytes)
          maximum: 7864320
        mimeType:
          type: string
          enum:
            - application/pdf
            - image/png
            - image/jpeg
            - image/bmp
          description: Only these 4 MIME types accepted (validated via magic bytes!)

    UploadRestrictions:
      type: object
      description: |
        Upload constraints (verified from JS source + translations):

        ## Accepted Formats (VALID_FILE_TYPES — exactly 4, no others!)
        - application/pdf (magic: 25504446 = %PDF)
        - image/png (magic: 89504E47)
        - image/jpeg (magic: FFD8FF)
        - image/bmp (magic: 424D)

        ## Validation
        - Client: Magic-bytes check via FileReader.slice(0,4)
        - Server: Re-validates (error FFP 470)
        - All uploads are server-side converted to PDF

        ## Size Limits
        - Single file: 7.5 MB (FFP 450)
        - Total per message: 7.5 MB (FFP 455)
        - PDF after conversion: 7.5 MB (FFP 451)
        - Max pages (PDF): 100 (FFP 475)

        ## Filename Rules
        - Max length: 80 chars (FFP 430)
        - No invalid characters (FFP 440)
        - Must not start with dot (FFP 441)
        - Must not end with dot (FFP 442)
        - Must not start with space (FFP 443)
        - Must not end with space (FFP 444)
        - No OS-reserved words (FFP 445)
        - No duplicates per message (FFP 490)

        ## Non-convertible PDFs
        - Form PDFs (FFP 471)
        - Encrypted PDFs (FFP 472)
        - PDFs with embedded attachments (FFP 473)
        - Images with transparent background (FFP 474)
      properties:
        maxSingleFileBytes:
          type: integer
          const: 7864320
          description: 7.5 MB
        maxTotalBytes:
          type: integer
          const: 7864320
          description: 7.5 MB total for all attachments
        maxPages:
          type: integer
          const: 100
        maxFilenameLength:
          type: integer
          const: 80
        validMimeTypes:
          type: array
          items:
            type: string
          const:
            - application/pdf
            - image/png
            - image/jpeg
            - image/bmp
        magicBytes:
          type: object
          properties:
            PDF:
              type: string
              const: "25504446"
            PNG:
              type: string
              const: "89504E47"
            JPG:
              type: string
              const: "FFD8FF"
            BMP:
              type: string
              const: "424D"

    SendNachrichtRequest:
      type: object
      description: |
        Request body for sending or drafting a message.
        Exact field names not yet verified via network capture.
        Predicted from form fields + anliegen catalog.

        ## Server-side validation (FFP error codes):
        - FFP 200: betreff missing
        - FFP 204: bezug missing
        - FFP 206: dienststellennummer missing
        - FFP 208: dienststellenname missing
        - FFP 209: vertrauensniveau missing
        - FFP 210: betreff too long (max 255 chars server-side!)
        - FFP 220: invalid chars in betreff
        - FFP 230: text missing
        - FFP 310: text too long (server says max 1000 chars — DISCREPANCY with UI max 5000!)
        - FFP 320: invalid chars in text
      required:
        - betreff
        - text
        - bezug
        - dienststellennummer
        - dienststellenname
      properties:
        betreff:
          type: string
          minLength: 1
          maxLength: 50
          description: |
            Subject line. JobSync uses browser-side limit (50 chars) to behave
            like a normal user. Server technically accepts up to 255 (FFP 210).
            Only ERLAUBTEZEICHEN charset allowed (FFP 220).
        text:
          type: string
          minLength: 1
          maxLength: 5000
          description: |
            Message body. JobSync uses browser-side limit (5000 chars).
            Server FFP 310 error mentions 1000 — may be outdated translation.
            Only ERLAUBTEZEICHEN + ERLAUBTE_LEERZEICHEN (tab, newline, CR) allowed.
        bezug:
          type: string
          description: |
            Category tag from anliegen catalog (e.g. "Anfrage Allgemeine Anfrage").
            Must match a valid bezug for the target dienststelle.
            FFP 1001: some bezug values only for initial messages.
            FFP 1002: some bezug values only for replies.
        dienststellennummer:
          type: string
          pattern: "^\\d{5}$"
          description: 5-digit target office number (FFP 206 if missing, FFP 1000 if invalid)
        dienststellenname:
          type: string
          description: Target office display name (FFP 208 if missing)
        dienststellenArt:
          type: string
          enum: [AA, JC, GE]
          description: Office type
        anliegenId:
          type: string
          description: Anliegen ID from catalog
        subanliegenId:
          type: string
          description: Sub-anliegen ID from catalog

    # --- Leistungen ---
    LeistungenResponse:
      type: object
      properties:
        insgLeistungs:
          type: array
          items:
            type: object
        algLeistungs:
          type: array
          items:
            type: object
        babLeistungs:
          type: array
          items:
            type: object
        failedCalls:
          type: array
          items:
            type: object

    BgDatenResponse:
      type: object
      properties:
        bgDaten:
          type: object
          properties:
            aktuelleBG:
              type: object
              properties:
                bgNummer:
                  type: string
                baTeam:
                  type: object
                  properties:
                    dienststellennummer:
                      type: string
                    teamkennzeichen:
                      type: string

    # --- System ---
    Wartungshinweis:
      type: object
      properties:
        fromDate:
          type: string
          format: date-time
        state:
          type: string
          enum: [active_from_to, inactive]
        text:
          type: string
          description: HTML content
        toDate:
          type: string
          format: date-time

    # === AUTH / TOKEN SCHEMAS ===
    TokenRequestAuthCode:
      type: object
      required: [grant_type, redirect_uri, code, code_verifier, client_id, client_secret]
      properties:
        grant_type:
          type: string
          const: authorization_code
        redirect_uri:
          type: string
          format: uri
          description: Must match the redirect_uri from the authorization request
        code:
          type: string
          description: Authorization code from Keycloak callback
        code_verifier:
          type: string
          description: PKCE code verifier (S256)
        correlation-id:
          type: string
          format: uuid
          description: Request correlation ID (optional)
        client_id:
          type: string
          description: OAuth client ID (e.g. profil-online, kokos)
        client_secret:
          type: string
          description: Client secret (same as client_id for public clients)

    TokenRequestRefresh:
      type: object
      required: [grant_type, refresh_token, client_id, client_secret]
      properties:
        grant_type:
          type: string
          const: refresh_token
        refresh_token:
          type: string
          description: Current refresh token
        scope:
          type: string
          default: openid baportal
        correlation-id:
          type: string
          format: uuid
        client_id:
          type: string
        client_secret:
          type: string

    TokenResponse:
      type: object
      required: [access_token, expires_in, refresh_token, refresh_expires_in, token_type, id_token, session_state, scope]
      properties:
        access_token:
          type: string
          description: JWT Bearer token (240s lifetime). Decode payload for session info.
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 240
        refresh_token:
          type: string
          description: Refresh token (3600s technical lifetime, but dies with session)
        refresh_expires_in:
          type: integer
          description: Refresh token technical lifetime (NOT effective — session ends at 30 min)
          example: 3600
        token_type:
          type: string
          example: Bearer
        id_token:
          type: string
          description: OIDC ID token (JWT, contains profile claims)
        not-before-policy:
          type: integer
          example: 0
        session_state:
          type: string
          format: uuid
          description: Keycloak session ID
        scope:
          type: string
          example: openid baportal

    TokenError:
      type: object
      required: [error, error_description]
      properties:
        error:
          type: string
          enum: [invalid_grant, invalid_client, invalid_request, unauthorized_client]
          description: OAuth2 error code
        error_description:
          type: string
          description: Human-readable error detail
          example: "Session not active"

    JWTAccessTokenPayload:
      type: object
      description: |
        Decoded JWT access_token payload. Contains session timing and user identity.
        Decode via: JSON.parse(atob(token.split('.')[1]))
      required: [exp, iat, auth_time, iss, aud, sub, azp, sid, scope]
      properties:
        exp:
          type: integer
          description: Token expiration (Unix timestamp). exp - iat ≈ 240s.
        iat:
          type: integer
          description: Token issued-at (Unix timestamp). Rotates with each refresh.
        auth_time:
          type: integer
          description: |
            Login timestamp (Unix). FIXED for entire session.
            Session remaining = auth_time + 1800 - now()
        iss:
          type: string
          example: https://sso.arbeitsagentur.de/auth/realms/OCP
        aud:
          type: string
          description: Authorized audience (client_id)
          example: profil-online
        sub:
          type: string
          description: Subject (URN with eKID UUID)
          example: "urn:ekid:7162f7fe-dbc3-4f31-a254-8a5abd80c685"
        azp:
          type: string
          description: Authorized party (same as client_id)
        sid:
          type: string
          format: uuid
          description: Session ID (correlates with session_state in token response)
        typ:
          type: string
          example: Bearer
        scope:
          type: string
          example: openid baportal
        authn-level:
          type: string
          enum: [STORK-QAA-Level-1, STORK-QAA-Level-2, STORK-QAA-Level-3, STORK-QAA-Level-4]
          description: Authentication trust level (4 = eID, 1 = password)
        acting-type:
          type: string
          enum: [privatperson, unternehmen, partner]
        benutzertyp:
          type: string
          example: onlineuser
        jwt-version:
          type: string
          example: "2.9"
        amr:
          type: array
          items:
            type: string
          description: Authentication methods used
          example: ["mfa"]
        groups:
          type: array
          items:
            type: string
          description: Keycloak group memberships (includes permission levels)
          example: ["2", "nid", "profil-online.level-300", "type.privatperson"]
        identifier:
          type: string
          description: Kundennummer (PII — redact in logs)
        identity:
          type: string
          description: Full URN identity (PII — contains Kundennummer)
        acting-on-behalf-of:
          type: array
          items:
            type: string
          description: URN list of identities this user acts on behalf of
        preferred_username:
          type: string
          description: Email address (PII — redact in logs)
        acting-profile-name:
          type: string
          description: Display name (PII — redact in logs)
        session_state:
          type: string
          format: uuid

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OAuth2 Bearer Token from Keycloak (sso.arbeitsagentur.de/auth/realms/OCP).
        Obtained via PKCE Authorization Code flow (S256).
        Expires in 240s, auto-refreshed by oiam-oauth-wc.

        Session timing derivable from JWT:
          session_remaining = auth_time + 1800 - now()

        Token stored in sessionStorage key:
          oidc.user:https://sso.arbeitsagentur.de/auth/realms/OCP:{client_id}

    oauthPKCE:
      type: oauth2
      description: |
        PKCE Authorization Code flow via Keycloak.
        Requires interactive login (BundID eID or BA-Konto).
      flows:
        authorizationCode:
          authorizationUrl: https://sso.arbeitsagentur.de/auth/realms/OCP/protocol/openid-connect/auth
          tokenUrl: https://sso.arbeitsagentur.de/auth/realms/OCP/protocol/openid-connect/token
          scopes:
            openid: OpenID Connect
            baportal: BA Portal access

security:
  - bearerAuth: []
