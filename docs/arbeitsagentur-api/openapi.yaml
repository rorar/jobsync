            type: string
            enum: [AA, JC]
          description: "AA = Agentur für Arbeit, JC = Jobcenter"
        - name: dstnr
          in: path
          required: true
          schema:
            type: string
            pattern: "^\\d{5}$"
          description: 5-digit Dienststellennummer
      responses:
        "200":
