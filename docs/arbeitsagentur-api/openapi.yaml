  /kokos/kokos-ui-service/pd/v1/ordner/{ordnerId}/nachrichten:
    get:
      operationId: listNachrichten
      summary: List messages in folder
      tags: [Postfach]
      security:
        - bearerAuth: []
      parameters:
        - name: ordnerId
          in: path
          required: true
          schema:
            type: string
            enum: [entwurf, erhalten, geloescht, gesendet]
      responses:
        "200":
          description: Messages in folder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NachrichtSummary"

  /kokos/kokos-ui-service/pd/v1/dienststellen/vorbelegung:
    get:
      operationId: getDienststellenVorbelegung
      summary: Get pre-selected offices for messaging
      tags: [Postfach]
      security:
        - bearerAuth: []
      responses:
