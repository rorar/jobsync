  # === LEISTUNGEN ===
  /aue/api/pd/graphql:
    post:
      operationId: queryLeistungen
      summary: Query benefits/cases via GraphQL
      tags: [Leistungen]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  description: GraphQL query
                variables:
                  type: object
            example:
              query: "query AueLipPp($anzahlVorgangeProGruppe: Int! = 2) { gruppenV2(anzahlVorgangeProGruppe: $anzahlVorgangeProGruppe) { sindAlleGruppenVorhanden gruppen { name anzahlVorgaengeTotal } } }"
      responses:
        "200":
          description: GraphQL response
          content:
            application/graphql-response+json:
              schema:
